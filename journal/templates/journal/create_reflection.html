{% extends "base.html" %}
{% load static %}
{% block title %}振り返り作成{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <section class="journal-card reflection-card">
    <div class="card-header">
      <h5 class="reflection-text view-title">振り返りを記録</h5>
      <a href="{{ cancel_url }}" class="back-btn reflection-btn reflection-text">キャンセル</a>
    </div>
    <div class="card-body">
      <hr class="section-divider reflection-divider mb-3">
      <form method="post">
        {% csrf_token %}
        <div class="journal-input-card mb-4">
          {{ form.content }}
        </div>
        <div class="text-center mt-4">
          <button type="submit" class="submit-btn">振り返りを作成</button>
        </div>
      </form>
    </div>
  </section>
</div>
{% endblock %}
